services:
  postgres:
    image: postgres:15-alpine
    container_name: carelynk-db
    environment:
      POSTGRES_DB: carelynk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d carelynk"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      default:
        aliases:
          - db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carelynk-backend
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/carelynk
      JWT_SECRET: your-super-secret-jwt-key-minimum-32-characters
      JWT_EXPIRE: 7d
      BCRYPT_ROUNDS: 10
      LOG_LEVEL: debug
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carelynk-frontend
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      REACT_APP_API_BASE_URL: http://localhost:3001
      WDS_SOCKET_PORT: "0"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start
    stdin_open: true
    tty: true

volumes:
  postgres_data:

